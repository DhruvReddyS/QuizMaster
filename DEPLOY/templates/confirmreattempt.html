<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Quiz Reattempt</title>
    <link rel="stylesheet" href="/static/confirmquiz.css">

    <script>
        function confirmClose() {
            const confirmation = confirm("Are you sure you want to cancel reattempting the quiz?");
            if (confirmation) {
                window.location.href = "/studentdashboard";
            }
        }
    </script>
</head>
<body>
    <div class="quiz-box">
        <h2>Quiz Reattempt Confirmation</h2>
        <p><strong>Quiz Name:</strong> {{ quiz.quiz_name }}</p>
        <p><strong>Date:</strong> {{ quiz.date_of_quiz.strftime("%d/%m/%Y") }}</p>
        <p><strong>Duration:</strong> {{ quiz.duration.strftime("%H:%M") }}</p>
        <p><strong>Remarks:</strong> {{ quiz.remarks or "N/A" }}</p>

        <div class="button-group">
            <form method="post" action="{{ url_for('confirm_reattempt', quiz_id=quiz.quiz_id) }}">
                <p>Do you want to <strong>reattempt</strong> the quiz "<strong>{{ quiz.quiz_name }}</strong>"?</p>
                <button class="btn start" type="submit">Start Reattempt</button>
                <button class="btn close" type="button" onclick="confirmClose()">Close</button>
            </form>                                    
        </div>

    </div>
</body>
</html>
