<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Quiz</title>
    <link rel="stylesheet" href="/static/newquiz.css">
</head>
<body>
    <form class="form-container" action="/edit-quiz/{{ quiz.quiz_id }}" method="post">
        <h2>Edit Quiz</h2>
        <div class="error">{{ str }}</div>

        <!-- Hidden Chapter ID -->
        <input type="hidden" name="chap_id" value="{{ quiz.chap_id }}">

        <!-- Quiz Name -->
        <div class="input-group">
            <label for="quiz_name">Quiz Name</label>
            <input type="text" id="quiz_name" name="quiz_name" value="{{ quiz.quiz_name }}" required>
        </div>

        <!-- Date -->
        <div class="input-group">
            <label for="date_of_quiz">Date of Quiz</label>
            <input type="date" id="date_of_quiz" name="date_of_quiz" value="{{ quiz.date_of_quiz }}" required>
        </div>

        <!-- Duration -->
        <div class="input-group">
            <label for="duration">Duration (in minutes)</label>
            <input type="number" id="duration" name="duration" value="{{ quiz.duration.hour * 60 + quiz.duration.minute }}" required>
        </div>

        <!-- Total Marks -->
        <div class="input-group">
            <label for="total_marks">Total Marks</label>
            <input type="number" id="total_marks" name="total_marks" value="{{ quiz.total_marks }}" required>
        </div>

        <!-- Remarks -->
        <div class="input-group">
            <label for="remarks">Remarks (Optional)</label>
            <input type="text" id="remarks" name="remarks" value="{{ quiz.remarks }}">
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('quiz_details', quiz_id=quiz.quiz_id) }}" class="cancel-button">Cancel</a>
        </div>
    </form>
</body>
</html>
