<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Subject</title>
    <link rel="stylesheet" href="/static/newsub.css">
</head>
<body>
    <form class="form-container" action="/edit-subject/{{ subject.sub_id }}" method="post">
        <h2>Edit Subject</h2>
        <div class="error">{{ str }}</div>

        <div class="input-group">
            <label for="sub">Subject Name</label>
            <input type="text" id="sub" name="sub" value="{{ subject.sub_name }}" required>
        </div>

        <div class="input-group">
            <label for="desc">Description</label>
            <input type="text" id="desc" name="desc" value="{{ subject.sub_desc }}">
        </div>

        <div class="button-group">
            <button type="submit">Save Changes</button>
            <a href="/admindashboard" class="cancel-button">Cancel</a>
        </div>
    </form>
</body>
</html>
